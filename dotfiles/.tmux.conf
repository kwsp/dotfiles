# =============================================================================
# General
# =============================================================================

set -g default-terminal "screen-256color"
set -g default-shell /bin/zsh
set -g history-limit 10000
set -g mouse on
set -g focus-events on
set -g set-clipboard on

# Vi mode
set -g status-keys vi
set -g mode-keys vi

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Switch to another session when destroying the last window (instead of detaching)
set -g detach-on-destroy off

# Reduce escape delay
set -sg escape-time 10

# New windows/panes retain current path
bind c new-window -c "#{pane_current_path}"
bind C-c new-session
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Intuitive split bindings
bind \\ split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

# Edit tmux config in a new window
bind e new-window -n 'tmux.conf' '${EDITOR:-vim} ~/.tmux.conf'

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# =============================================================================
# Copy mode & clipboard
# =============================================================================

# Copy to OS clipboard (requires xsel or xclip on Linux)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"

# Mouse scroll speed (one line at a time)
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down

# =============================================================================
# Theme (Rosé Pine)
# =============================================================================

# Variant: 'main', 'moon', or 'dawn'
set -g @rose_pine_variant 'main'

set -g @rose_pine_host 'off'
set -g @rose_pine_user 'off'
set -g @rose_pine_directory 'off'

set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

set -g @rose_pine_disable_active_window_menu 'on'

set -g @rose_pine_default_window_behavior 'on'
set -g @rose_pine_show_current_program 'on'
set -g @rose_pine_show_pane_directory 'on'

# Minimal window tabs: "1:vim  2:zsh  3:htop"
set -g @rose_pine_left_separator ':'
set -g @rose_pine_window_status_separator '  '

# Custom right status: user@host  Jul 03 07:20 PM  working-dir
set -g @rose_pine_status_right_prepend_section '#[fg=#c4a7e7]#(whoami)@#H:#[fg=#ebbcba]#{pane_current_path}  #[fg=#9ccfd8]%b %d | %I:%M %p'

# Status bar position
set -g status-position top

# Terminal title
set -g set-titles on
set -g set-titles-string "#(whoami)@#H ❐ #W"

# =============================================================================
# Key bindings
# =============================================================================

# Smart pane switching with awareness of Vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Restore C-l (clear screen) behind prefix
bind C-l send-keys 'C-l'

# Alt+N to switch windows
bind-key -T root 'M-1' select-window -t :=1
bind-key -T root 'M-2' select-window -t :=2
bind-key -T root 'M-3' select-window -t :=3
bind-key -T root 'M-4' select-window -t :=4
bind-key -T root 'M-5' select-window -t :=5
bind-key -T root 'M-6' select-window -t :=6
bind-key -T root 'M-7' select-window -t :=7
bind-key -T root 'M-8' select-window -t :=8
bind-key -T root 'M-9' select-window -t :=9
bind-key -T root 'M-0' select-window -t :=0

# =============================================================================
# Extended keys (for modern terminal features / Claude Code)
# =============================================================================

set -g extended-keys on
set -g extended-keys-format csi-u
set -s extended-keys on
set -as terminal-features 'tmux-256color:extkeys'

# Shift-Enter support (Claude Code)
# https://gist.github.com/jftuga/ffa03dbf4cd818f00cc32ce4186d6c1c
bind-key -n S-Enter send-keys Escape "[13;2u"

# =============================================================================
# Plugins (TPM)
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'rose-pine/tmux'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Override tab formats after rose-pine loads (consistent padding)
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "fg=#f6c177,bg=#403d52,bold"
